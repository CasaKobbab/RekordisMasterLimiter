name: Build macOS VST3 and AU

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get CMake
      uses: lukka/get-cmake@latest

    - name: Configure CMake
      run: cmake -B build-mac -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build-mac --config Release --parallel

    - name: Zip VST3
      run: |
        cd build-mac/RekordisMasterLimiter_artefacts/Release/VST3
        zip -r ../../../../RekordisMasterLimiter_Mac_VST3.zip RekordisMasterLimiter.vst3

    - name: Zip AU
      run: |
        cd build-mac/RekordisMasterLimiter_artefacts/Release/AU
        zip -r ../../../../RekordisMasterLimiter_Mac_AU.zip RekordisMasterLimiter.component

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RekordisMasterLimiter-Mac-Plugins
        path: |
          RekordisMasterLimiter_Mac_VST3.zip
          RekordisMasterLimiter_Mac_AU.zip
